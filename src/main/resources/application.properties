spring.application.name=ch5-lab-spring-jpa-advanced

# ===================================================================
# CẤU HÌNH KẾT NỐI CSDL (DataSource)
# ===================================================================
# 1. URL kết nối JDBC đến MySQL
#    - localhost:3306 là địa chỉ và cổng mặc định của MySQL Server
#    - gdu_jpa_lab là tên database vừa tạo
spring.datasource.url=jdbc:mysql://localhost:3306/gdu_jpa_lab?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh

# 2. Tài khoản đăng nhập MySQL
spring.datasource.username=root
spring.datasource.password=Dao666999

# 3. Driver kết nối MySQL (có thể bỏ qua ở Spring Boot 3.x vì tự phát hiện)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CẤU HÌNH JPA / HIBERNATE (hỗ trợ phát triển)
# ===================================================================
# Tự động cập nhật schema theo entity (update: giữ dữ liệu, chỉ bổ sung thay đổi)
spring.jpa.hibernate.ddl-auto=update

# In câu lệnh SQL do Hibernate sinh ra ra console
spring.jpa.show-sql=true

# Định dạng câu lệnh SQL cho dễ đọc
spring.jpa.properties.hibernate.format_sql=true

# Khai báo phương ngữ (dialect) tương ứng với MySQL 8
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================================================
# BỔ SUNG CHO CHƯƠNG 5
# ===================================================================
# In cả giá trị tham số được gán vào dấu ? của câu SQL,
# giúp quan sát rõ truy vấn JPQL (/expensive) và Native SQL (/top3) ở Bài 2.
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# open-in-view giữ phiên Hibernate mở tới lúc sinh JSON, nhờ đó các quan hệ LAZY
# (Product.category, Student.courses) vẫn nạp được khi Jackson đọc.
# Khai báo tường minh để Spring Boot không in cảnh báo lúc khởi động.
spring.jpa.open-in-view=true
